<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>朴牛牛朋友圈生成器</title>
    <style>
      :root {
        --bg: #f3f5f2;
        --panel: #ffffff;
        --panel-soft: #f8faf8;
        --text: #202722;
        --muted: #68746d;
        --subtle: #8b9690;
        --line: #dfe7e1;
        --line-strong: #c6d4ca;
        --wechat: #07c160;
        --wechat-dark: #058944;
        --warm: #c88422;
        --warm-bg: #fff7e8;
        --brown: #5f4430;
        --shadow: 0 16px 36px rgba(32, 39, 34, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        overflow-x: hidden;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(7, 193, 96, 0.12), rgba(243, 245, 242, 0) 260px),
          var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", Arial, sans-serif;
        letter-spacing: 0;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: min(100%, 760px);
        min-width: 0;
        margin: 0 auto;
        padding: 16px 14px calc(104px + env(safe-area-inset-bottom));
      }

      .hero {
        padding: 8px 2px 12px;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .version {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(7, 193, 96, 0.28);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.08);
        font-size: 12px;
        font-weight: 750;
      }

      h1 {
        margin: 10px 0 6px;
        font-size: 28px;
        line-height: 1.14;
        letter-spacing: 0;
      }

      .hero p {
        margin: 0;
        max-width: 34em;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.58;
      }

      .panel {
        margin: 12px 0;
        padding: 14px;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .section-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-title h2,
      .result-title h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.35;
      }

      .hint {
        margin: 0;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.5;
        text-align: right;
      }

      .field {
        margin-top: 18px;
        min-width: 0;
      }

      .field:first-child {
        margin-top: 0;
      }

      .today-brief {
        margin-top: 18px;
        padding: 12px;
        min-width: 0;
        border: 1px solid rgba(7, 193, 96, 0.16);
        border-radius: 8px;
        background: rgba(7, 193, 96, 0.045);
      }

      .today-brief .section-title {
        margin-bottom: 10px;
      }

      .brief-grid {
        display: grid;
        gap: 10px;
      }

      label,
      .field-label {
        display: block;
        margin-bottom: 9px;
        color: var(--text);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .intent-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .intent-card {
        min-height: 82px;
        min-width: 0;
        padding: 11px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        text-align: left;
        cursor: pointer;
      }

      .intent-card strong {
        display: block;
        margin-bottom: 5px;
        font-size: 15px;
        line-height: 1.25;
      }

      .intent-card small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.42;
      }

      .chip-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .chip {
        min-height: 42px;
        min-width: 0;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        text-align: center;
        font-size: 14px;
        font-weight: 750;
        line-height: 1.25;
        cursor: pointer;
      }

      .intent-card[aria-pressed="true"],
      .chip[aria-pressed="true"] {
        border-color: var(--wechat);
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
        box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.22);
      }

      .intent-card:focus-visible,
      .chip:focus-visible,
      .text-button:focus-visible,
      .copy-button:focus-visible,
      .secondary-button:focus-visible,
      .primary-button:focus-visible,
      textarea:focus-visible,
      summary:focus-visible {
        outline: 3px solid rgba(7, 193, 96, 0.25);
        outline-offset: 2px;
      }

      textarea {
        width: 100%;
        min-width: 0;
        min-height: 86px;
        resize: vertical;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        font-size: 15px;
        line-height: 1.62;
      }

      textarea::placeholder {
        color: #9aa69f;
      }

      .brief-input {
        min-height: 56px;
        font-size: 14px;
        line-height: 1.55;
      }

      .advanced {
        margin-top: 18px;
        border-top: 1px solid var(--line);
      }

      .advanced summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        list-style: none;
        color: var(--wechat-dark);
        cursor: pointer;
        font-size: 14px;
        font-weight: 850;
      }

      .advanced summary::-webkit-details-marker {
        display: none;
      }

      .advanced summary::after {
        content: "展开";
        flex: 0 0 auto;
        color: var(--subtle);
        font-size: 12px;
        font-weight: 700;
      }

      .advanced[open] summary::after {
        content: "收起";
      }

      .advanced-grid {
        display: grid;
        gap: 18px;
        padding-top: 2px;
      }

      .switches {
        display: grid;
        gap: 10px;
      }

      .switch-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .switch-row input {
        width: 20px;
        height: 20px;
        accent-color: var(--wechat);
        margin: 1px 0 0;
      }

      .switch-row span {
        display: block;
        margin-bottom: 2px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .switch-row small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .result-panel {
        padding: 0;
        overflow: hidden;
        border-color: rgba(7, 193, 96, 0.32);
      }

      .result-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 0;
      }

      .count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 12px;
      }

      .moment-preview {
        margin-top: 12px;
        padding: 15px 14px 14px;
        background: #fff;
      }

      .candidate-list {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .candidate-card {
        padding: 13px;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .candidate-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .candidate-title {
        min-width: 0;
      }

      .candidate-title strong {
        display: block;
        color: #295a3f;
        font-size: 15px;
        line-height: 1.35;
      }

      .candidate-title small {
        display: block;
        margin-top: 2px;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.4;
      }

      .candidate-count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .moment-user {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #202722, #5f4430);
        font-size: 18px;
        font-weight: 900;
      }

      .moment-name {
        min-width: 0;
      }

      .moment-name strong {
        display: block;
        overflow: hidden;
        color: #295a3f;
        font-size: 15px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .moment-name small {
        display: block;
        margin-top: 2px;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.35;
      }

      .moment-text {
        min-height: 142px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #17201a;
        background: #fbfcfb;
        font-size: 17px;
        line-height: 1.72;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .image-tip {
        margin-top: 11px;
        padding: 10px 11px;
        border: 1px solid #efd8aa;
        border-radius: 8px;
        color: var(--brown);
        background: var(--warm-bg);
        font-size: 13px;
        line-height: 1.55;
      }

      .quality-tip {
        margin-top: 8px;
        padding: 9px 10px;
        border: 1px solid rgba(7, 193, 96, 0.18);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.06);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.5;
      }

      .copy-button {
        width: 100%;
        min-height: 54px;
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: var(--wechat);
        box-shadow: 0 12px 24px rgba(7, 193, 96, 0.28);
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
      }

      .copy-button.copied {
        background: var(--wechat-dark);
        box-shadow: none;
      }

      .rewrite-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .text-button {
        min-height: 38px;
        padding: 8px 7px;
        border: 1px solid rgba(7, 193, 96, 0.18);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.07);
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .note {
        margin: 12px 14px 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .secondary-button,
      .primary-button {
        min-height: 48px;
        min-width: 0;
        border: 0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 850;
        cursor: pointer;
      }

      .secondary-button {
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
      }

      .primary-button {
        color: #fff;
        background: var(--wechat);
        box-shadow: 0 10px 24px rgba(7, 193, 96, 0.24);
      }

      .primary-button:active,
      .secondary-button:active,
      .copy-button:active,
      .text-button:active,
      .intent-card:active,
      .chip:active {
        transform: translateY(1px);
      }

      .sticky-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: rgba(243, 245, 242, 0.9);
        border-top: 1px solid rgba(223, 231, 225, 0.95);
        backdrop-filter: blur(18px);
      }

      .sticky-inner {
        width: min(100%, 760px);
        min-width: 0;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(82px + env(safe-area-inset-bottom));
        z-index: 30;
        transform: translateX(-50%) translateY(12px);
        max-width: calc(100vw - 32px);
        padding: 10px 12px;
        border-radius: 8px;
        color: #fff;
        background: rgba(32, 39, 34, 0.9);
        font-size: 13px;
        line-height: 1.4;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (min-width: 620px) {
        .app {
          padding-top: 26px;
        }

        h1 {
          font-size: 34px;
        }

        .panel {
          padding: 18px;
        }

        .result-panel {
          padding: 0;
        }

        .result-title {
          padding: 18px 18px 0;
        }

        .moment-preview {
          padding: 16px 18px 18px;
        }

        .intent-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .chip-group {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .advanced-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .brief-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .switches {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sticky-inner {
          grid-template-columns: 150px 220px;
          justify-content: end;
        }
      }

      @media (max-width: 520px) {
        body {
          width: min(100%, 390px);
        }

        .app {
          width: 100%;
          margin-right: 0;
          margin-left: 0;
          padding-right: 10px;
          padding-left: 10px;
        }

        .sticky-bar {
          right: auto;
          width: min(100%, 390px);
          padding-right: 10px;
          padding-left: 10px;
        }

        .sticky-inner {
          width: 100%;
        }
      }

      @media (max-width: 420px) {
        .app {
          padding-right: 10px;
          padding-left: 10px;
        }

        .panel {
          padding: 12px;
        }

        .result-panel {
          padding: 0;
        }

        .result-title,
        .candidate-list {
          padding-right: 12px;
          padding-left: 12px;
        }

        .intent-grid,
        .chip-group {
          gap: 8px;
        }

        .intent-card {
          min-height: 78px;
          padding: 10px 8px;
        }

        .chip {
          padding-right: 7px;
          padding-left: 7px;
          font-size: 13px;
        }

        textarea {
          padding-right: 11px;
          padding-left: 11px;
        }

        .today-brief,
        .candidate-card {
          padding: 11px;
        }

        .sticky-bar {
          padding-right: 10px;
          padding-left: 10px;
        }

        .sticky-inner {
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="eyebrow">
          <span>朴牛牛黑牛烤肉 · 门店员工版</span>
          <span class="version">v2.3.1</span>
        </div>
        <h1>朋友圈生成器</h1>
        <p>少选几项，填一句今日口径，一次生成 3 条可选文案。门店员工挑一条复制就能发。</p>
      </header>

      <section class="panel" aria-labelledby="quick-form-title">
        <div class="section-title">
          <h2 id="quick-form-title">先选今天要发什么</h2>
          <p class="hint">高级项默认不用管</p>
        </div>

        <div class="field">
          <span class="field-label">今天发什么</span>
          <div class="intent-grid" data-group="intent">
            <button class="intent-card" type="button" data-value="newProduct" aria-pressed="true">
              <strong>新品尝鲜</strong>
              <small>新口味、新菜、想让人试试</small>
            </button>
            <button class="intent-card" type="button" data-value="signature" aria-pressed="false">
              <strong>招牌必点</strong>
              <small>黑牛、拼盘、第一次来好点</small>
            </button>
            <button class="intent-card" type="button" data-value="oldCustomer" aria-pressed="false">
              <strong>老客回来</strong>
              <small>九田家老会员、门店升级</small>
            </button>
            <button class="intent-card" type="button" data-value="afterWork" aria-pressed="false">
              <strong>下班聚餐</strong>
              <small>万博附近、朋友约饭</small>
            </button>
            <button class="intent-card" type="button" data-value="atmosphere" aria-pressed="false">
              <strong>现场热闹</strong>
              <small>店里日常、顾客返图、烟火气</small>
            </button>
            <button class="intent-card" type="button" data-value="benefit" aria-pressed="false">
              <strong>福利提醒</strong>
              <small>团购、会员权益、当天活动</small>
            </button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">发给谁看</span>
          <div class="chip-group" data-group="target">
            <button class="chip" type="button" data-value="oldMembers" aria-pressed="true">老会员</button>
            <button class="chip" type="button" data-value="workers" aria-pressed="false">附近上班族</button>
            <button class="chip" type="button" data-value="gathering" aria-pressed="false">朋友/家庭聚餐</button>
            <button class="chip" type="button" data-value="nightMeat" aria-pressed="false">晚上想吃肉的人</button>
          </div>
        </div>

        <div class="today-brief" aria-labelledby="brief-title">
          <div class="section-title">
            <h2 id="brief-title">今日口径</h2>
            <p class="hint">不填也能生成</p>
          </div>
          <div class="brief-grid">
            <div class="field">
              <label for="todayFact">今天有什么</label>
              <textarea
                class="brief-input"
                id="todayFact"
                maxlength="42"
                placeholder="新品 / 顾客返图 / 直播 / 牛肉看着不错"
              ></textarea>
            </div>
            <div class="field">
              <label for="todayReminder">今天要提醒</label>
              <textarea
                class="brief-input"
                id="todayReminder"
                maxlength="42"
                placeholder="福利 / 会员 / 下班聚餐 / 老客回来"
              ></textarea>
            </div>
            <div class="field">
              <label for="todayRisk">今天不能写死</label>
              <textarea
                class="brief-input"
                id="todayRisk"
                maxlength="42"
                placeholder="活动不确定 / 库存不确定 / 营业时间不确定"
              ></textarea>
            </div>
          </div>
        </div>

        <details class="advanced">
          <summary>高级设置</summary>
          <div class="advanced-grid">
            <div class="field">
              <span class="field-label">时段</span>
              <div class="chip-group" data-group="time">
                <button class="chip" type="button" data-value="morning" aria-pressed="true">早上10点</button>
                <button class="chip" type="button" data-value="lunch" aria-pressed="false">午餐前</button>
                <button class="chip" type="button" data-value="afternoon" aria-pressed="false">下午</button>
                <button class="chip" type="button" data-value="dinner" aria-pressed="false">晚餐前</button>
                <button class="chip" type="button" data-value="lateNight" aria-pressed="false">夜宵前</button>
              </div>
            </div>

            <div class="field">
              <span class="field-label">语气</span>
              <div class="chip-group" data-group="tone">
                <button class="chip" type="button" data-value="familiar" aria-pressed="true">熟人提醒</button>
                <button class="chip" type="button" data-value="staffDaily" aria-pressed="false">店员日常</button>
                <button class="chip" type="button" data-value="softBenefit" aria-pressed="false">轻福利</button>
                <button class="chip" type="button" data-value="realScene" aria-pressed="false">真实现场</button>
              </div>
            </div>

            <div class="field">
              <span class="field-label">主推素材</span>
              <div class="chip-group" data-group="material">
                <button class="chip" type="button" data-value="auto" aria-pressed="true">自动匹配</button>
                <button class="chip" type="button" data-value="blackBeef" aria-pressed="false">黑牛必点</button>
                <button class="chip" type="button" data-value="classicPlatter" aria-pressed="false">三拼/五拼</button>
                <button class="chip" type="button" data-value="newDishes" aria-pressed="false">新品</button>
                <button class="chip" type="button" data-value="beefRibGift" aria-pressed="false">55元牛仔骨</button>

        if (!raw || contentV22.badPhrases.some((phrase) => raw.includes(phrase))) return "";
        return raw;
      }

      function getDailyBrief() {
        const fact = normalizeBriefValue(todayFactInput);
        const reminder = normalizeBriefValue(todayReminderInput);
        const risk = normalizeBriefValue(todayRiskInput);
        return {
          fact,
          reminder,
          risk,
          conservative: Boolean(risk) || safeBenefitToggle.checked,
        };
      }

      function stripTodayPrefix(text) {
        return text
          .replace(/^(今天|今日)\s*/g, "")
          .replace(/^(有|要提醒|提醒一下|提醒|主要提醒)\s*/g, "")
          .trim();
      }

      function buildFactLine(fact) {
        const body = stripTodayPrefix(fact);
        if (!body) return "";

        if (/顾客返图|返图/.test(body)) {
          return pick([
            "今天有顾客返图，这一桌看着挺舒服。",
            "刚好有顾客返图，想吃的话可以照着这桌点。",
            "今天有顾客返图，看图比说太多更直接。",
          ]);
        }

        if (/新品|新菜|新口味/.test(body)) {
          return pick([
            "今天有新品，想换口味的朋友可以问店员。",
            "今天有新口味，可以先点一份尝尝。",
            "今天有新品上桌，搭经典款一起点更稳。",
          ]);
        }

        if (/直播/.test(body)) {
          return pick([
            "今天如果看到直播，具体活动到店按当天口径问清楚。",
            "今天直播相关内容，以门店当天说明为准。",
          ]);
        }

        if (/牛肉|肉/.test(body) && /不错|新鲜|看着|状态|好/.test(body)) {
          return pick([
            "今天牛肉看着不错，烤起来会更有食欲。",
            "今天肉品看着挺精神，适合来吃一顿热的。",
            "今天这批肉看着不错，想吃的话到店问店员。",
          ]);
        }

        return pick([
          `今天有${body}，想吃的话到店问店员。`,
          `今天${body}，到店按人数帮你搭。`,
        ]);
      }

      function buildReminderLine(reminder) {
        const body = stripTodayPrefix(reminder);
        if (!body) return "";

        if (/下班|聚餐|约饭/.test(body)) {
          return pick([
            "下班想聚餐的话，几个人来都能按人数搭。",
            "下班约饭不用想太久，到店按人数帮你搭。",
            "下班想吃口热的，来万博顺路坐一桌。",
          ]);
        }

        if (/福利|会员|券|活动|权益/.test(body)) {
          return pick([
            "福利和会员权益先到店问清楚，再点餐更省心。",
            "手里有券或会员权益，到店先问店员。",
            "想用福利的话，到店按当天门店口径核一遍。",
          ]);
        }

        if (/老客|老会员|老朋友/.test(body)) {
          return pick([
            "老朋友回来先问权益，再慢慢点餐。",
            "老会员到店先问店员，按当天口径帮你看。",
          ]);
        }

        return pick([
          `${body}这件事，到店问店员更清楚。`,
          `如果在意${body}，点餐前先问店员。`,
        ]);
      }

      function normalizeExtra() {
        const brief = getDailyBrief();
        const lines = [];
        if (brief.fact) lines.push(buildFactLine(brief.fact));
        if (brief.reminder) lines.push(buildReminderLine(brief.reminder));
        if (!lines.length) return "";
        if (state.rewrite === "short") return pick(lines);
        return Math.random() < 0.72 ? pick(lines) : lines.join("");
      }

      function chooseProductKey(template) {
        if (template.id === "atm-09") return "charcoal";
        if (template.structure === "serviceAssist") return "grillAssist";
        if (state.intent === "benefit" && state.material === "beefRibGift") return "beefRib";

        const materialKey = getEffectiveMaterial();
        const materialPool = state.material === "auto" ? null : contentV22.materialProducts[materialKey];
        const intentPool = contentV22.intentProducts[state.intent] || contentV22.intentProducts.signature;
        return pick(materialPool || intentPool || contentV22.materialProducts.auto);
      }

      function getAudienceLine() {
        const pool = contentV22.audienceLines[state.intent]?.[state.target] || [];
        if (!pool.length) return "";
        if (state.rewrite === "short" && Math.random() < 0.55) return "";
        if (Math.random() < 0.28) return "";
        return pick(pool);
      }

      function getTimeLine() {
        return pick(contentV22.timeLines[state.time] || contentV22.timeLines.morning);
      }

      function getActionLine() {
        const brief = getDailyBrief();
        const needsConservativeAction = brief.risk || /活动|福利|会员|券|库存|营业|时间/.test(`${brief.fact}${brief.reminder}`);
        if (brief.conservative && needsConservativeAction) return "具体以当天门店口径为准，到店问店员。";
        if (state.intent === "benefit") return pick(contentV22.safeActions.benefit);
        if (state.intent === "oldCustomer") return pick(contentV22.safeActions.oldCustomer);
        if (state.rewrite === "short") return pick(["到店问店员就行。", "不会点按人数帮你搭。", "路过万博可以顺路来吃顿热的。"]);
        return pick(contentV22.safeActions.normal);
      }

      function applySlots(line, context) {
        return Object.entries(context).reduce((current, [key, value]) => current.replaceAll(`{${key}}`, value || ""), line);
      }

      function getTemplatePool() {
        const pack = contentV22.packs[state.intent] || contentV22.packs.newProduct;
        const allTemplates = pack.templates.slice();
        const preferredStructures = {
          daily: ["daily", "feedback", "staffPick", "oldReturn"],
          short: ["productSeed", "order", "sceneMeal", "benefit", "oldReturn"],
          scene: ["sceneMeal", "gathering", "daily", "feedback", "serviceAssist"],
        };

        const preferred = preferredStructures[state.rewrite];
        if (!preferred) return allTemplates;

        const filtered = allTemplates.filter((template) => preferred.includes(template.structure));
        return filtered.length >= 4 ? filtered : allTemplates;
      }

      function fitLines(lines, context) {
        const maximum = state.rewrite === "short" ? 86 : 110;
        const minimum = state.rewrite === "short" ? 38 : 50;
        let next = lines
          .map((line) => line.replace(/\s+/g, " ").trim())
          .filter(Boolean)
          .filter((line, index, arr) => arr.indexOf(line) === index);

        const hasExtraLine = Boolean(context.extraLine);
        if (hasExtraLine && !next.includes(context.extraLine)) {
          next.splice(Math.max(1, next.length - 1), 0, context.extraLine);
        }

        const removeLine = (predicate, allowExtra = false) => {
          const index = next.findIndex((line) => (allowExtra || line !== context.extraLine) && predicate(line));
          if (index >= 0) next.splice(index, 1);
          return index >= 0;
        };

        while (textLength(next.join("")) > maximum && next.length > 2) {
          if (removeLine((line) => line === context.audienceLine)) continue;
          if (removeLine((line) => line === context.timeLine)) continue;
          if (removeLine((line) => line === context.actionLine)) continue;
          if (removeLine((line) => line !== context.extraLine && next.indexOf(line) > 0)) continue;
          if (hasExtraLine && removeLine((line) => line === context.extraLine, true)) continue;
          next.splice(Math.max(1, next.length - 2), 1);
        }

        if (textLength(next.join("")) < minimum && context.audienceLine && !next.includes(context.audienceLine)) {
          next.splice(Math.max(1, next.length - 1), 0, context.audienceLine);
        }

        if (textLength(next.join("")) < minimum && context.actionLine && !next.includes(context.actionLine)) {
          next.push(context.actionLine);
        }

        return next;
      }

      function renderTemplate(template) {
        const product = contentV22.products[chooseProductKey(template)] || contentV22.products.blackBeef;
        const context = {
          emoji: maybeEmoji(),
          product: product.name,
          productNote: product.note,
          time: getTimeLine(),
          audience: getAudienceLine(),
          extra: normalizeExtra(),
          action: getActionLine(),
        };
        context.timeLine = context.time;
        context.audienceLine = context.audience;
        context.extraLine = context.extra;
        context.actionLine = context.action;

        const rendered = template.lines.map((line) => applySlots(line, context));
        const lines = fitLines(rendered, context);
        const text = cleanText(`${context.emoji}${lines.join("\n")}`);

        return {
          text,
          structure: template.structure,
          templateId: template.id,
          image: template.image || product.image,
          product: product.name,
        };
      }

      function getTextParts(text) {
        const lines = text.split("\n").filter(Boolean);
        return {
          first: lines[0] || "",
          last: lines[lines.length - 1] || "",
          compact: text.replace(/\s/g, ""),
        };
      }

      function similarityScore(firstText, secondText) {
        const first = new Set(firstText.replace(/[，。！？、\s]/g, "").split(""));
        const second = new Set(secondText.replace(/[，。！？、\s]/g, "").split(""));
        const shared = [...first].filter((item) => second.has(item)).length;
        return shared / Math.max(1, Math.min(first.size, second.size));
      }

      function hasRepeatedPhrase(text) {
        const pieces = text
          .replace(/[🥩🔥🍖📍✨🙌]/g, "")
          .split(/[，。！？、：:\n]/)
          .map((item) => item.trim())
          .filter((item) => item.length >= 6);

        return pieces.some((piece, index) =>
          pieces.some((other, otherIndex) =>
            index !== otherIndex &&
            (piece.includes(other) || other.includes(piece))
          )
        );
      }

      function isTooSimilarToBatch(result, batch) {
        const parts = getTextParts(result.text);
        return batch.some((item) => {
          const other = getTextParts(item.text);
          if (result.templateId === item.templateId) return true;
          if (parts.first.slice(0, 8) && parts.first.slice(0, 8) === other.first.slice(0, 8)) return true;
          if (parts.last && parts.last === other.last) return true;
          if (result.product === item.product) return true;
          return similarityScore(parts.compact, other.compact) > 0.68;
        });
      }

      function qualityCheck(result, batch = []) {
        const text = result.text;
        const length = textLength(text);
        const maximum = state.rewrite === "short" ? 86 : 110;
        const minimum = state.rewrite === "short" ? 38 : 50;
        const allBadWords = data.bannedWords.concat(contentV22.badPhrases, contentV22.metaPhrases);
        const brief = getDailyBrief();
        const compact = text.replace(/\s/g, "");

        if (!text || /undefined|null|\{|\}/.test(text)) return { pass: false, reason: "empty-slot" };
        if (length > maximum || length < minimum) return { pass: false, reason: "length" };
        if (allBadWords.some((word) => word && text.includes(word))) return { pass: false, reason: "bad-word" };
        if (/发朋友圈|文案|配图|今日口径|今天补充|今天提醒|你填了|不能写死|今天适合发|拍一张|拍三张|拍近景|发一张|照片会|先发一条|发出去/.test(text)) return { pass: false, reason: "meta-copy" };
        if (/23点|营业到|全天供应|库存|剩余|抢购/.test(text)) return { pass: false, reason: "strong-promise" };
        if (brief.risk && /一定|保证|都有|随时|马上|抢|剩/.test(text)) return { pass: false, reason: "risky-promise" };
        if (state.intent !== "benefit" && /69抵100|平台券|团购券|代金券/.test(text)) return { pass: false, reason: "benefit-conflict" };
        if (!["benefit", "oldCustomer"].includes(state.intent) && /会员权益|九田家/.test(text)) return { pass: false, reason: "member-conflict" };
        if (state.intent === "newProduct" && /权益|会员|九田家|老会员/.test(text)) return { pass: false, reason: "new-product-conflict" };
        if (new Set(text.split("\n")).size !== text.split("\n").length) return { pass: false, reason: "duplicate-line" };
        if (hasRepeatedPhrase(text)) return { pass: false, reason: "duplicate-phrase" };
        if (isTooSimilarToBatch(result, batch)) return { pass: false, reason: "batch-similar" };

        let score = Math.random();
        if (compact === lastSignature) score += 5;
        if (result.templateId === lastTemplateKey) score += 4;
        if (length > 98) score += 0.4;
        return { pass: true, score };
      }

      function buildCandidate() {
        return renderTemplate(pick(getTemplatePool()));
      }

      function buildFallbackCandidate() {
        const pack = contentV22.packs[state.intent] || contentV22.packs.newProduct;
        const fallback = renderTemplate(pack.fallback);
        const safeText = fallback.text
          .split("\n")
          .filter((line) => line && !contentV22.badPhrases.some((phrase) => line.includes(phrase)))
          .join("\n");
        return { ...fallback, text: cleanText(safeText) };
      }

      function buildMoment(rewrite = "daily", batch = []) {
        state.rewrite = rewrite;
        const candidates = [];

        for (let index = 0; index < 72; index += 1) {
          const candidate = buildCandidate();
          const check = qualityCheck(candidate, batch);
          if (check.pass) candidates.push({ ...candidate, score: check.score });
        }

        const selected = candidates.sort((a, b) => a.score - b.score)[0] || buildFallbackCandidate();
        lastSignature = selected.text.replace(/\s/g, "");
        lastTemplateKey = selected.templateId;
        return selected;
      }

      function buildBatch() {
        const batch = [];
        batchVariants.forEach((variant) => {
          const result = buildMoment(variant.key, batch);
          batch.push({ ...result, variant });
        });
        currentBatch = batch;
        return batch;
      }

      function buildImageSuggestion(result) {
        if (state.intent === "benefit" || result.structure === "benefit") {
          return `配图：${result.image}。截图和活动文字发前核对当天展示。`;
        }
        if (state.intent === "oldCustomer" || result.structure === "oldReturn") {
          return `配图：${result.image}。能拍门头、老客桌面或店员说明更合适。`;
        }
        if (result.structure === "serviceAssist") {
          return `配图：${result.image}。拍到店员夹肉或翻面，会更贴近这条内容。`;
        }
        if (["sceneMeal", "gathering", "daily", "feedback"].includes(result.structure)) {
          return `配图：${result.image}。尽量有烤盘热气、整桌或顾客桌面。`;
        }
        return `配图：${result.image}。再补一张烤盘近景，朋友圈会更直观。`;
      }

      function buildQualityTip(result) {
        if (result.structure === "benefit") return "发前看一眼：券、活动、会员权益按当天门店口径。";
        if (result.structure === "oldReturn") return "发前看一眼：老会员权益到店按当天口径说明。";
        if (getDailyBrief().risk) return "发前看一眼：活动、库存、营业时间按当天门店口径核对。";
        return pick(contentV22.qualityTips);
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function renderCandidate(result, index) {
        const structureLabel = data.structureLabels[result.structure] || "门店日常";
        return `
          <article class="candidate-card">
            <div class="candidate-head">
              <div class="candidate-title">
                <strong>${escapeHtml(result.variant.label)}</strong>
                <small>${escapeHtml(result.variant.desc)} · ${escapeHtml(data.intent[state.intent].label)} · ${escapeHtml(structureLabel)}</small>
              </div>
              <span class="candidate-count">${textLength(result.text)}字</span>
            </div>
            <div class="moment-user">
              <div class="avatar" aria-hidden="true">朴</div>
              <div class="moment-name">
                <strong>朴牛牛万博店</strong>
                <small>${escapeHtml(result.product)} · 门店实拍</small>
              </div>
            </div>
            <div class="moment-text candidate-text" data-index="${index}" tabindex="0">${escapeHtml(result.text)}</div>
            <div class="image-tip">${escapeHtml(buildImageSuggestion(result))}</div>
            <div class="quality-tip">${escapeHtml(buildQualityTip(result))}</div>
            <button class="copy-button" type="button" data-copy-index="${index}">复制这条</button>
          </article>
        `;
      }

      function updateOutput(batch) {
        candidateList.innerHTML = batch.map(renderCandidate).join("");
        batchCount.textContent = `${batch.length}条可选`;
      }

      function generateBatchOutput() {
        updateOutput(buildBatch());
        saveLocalState();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function selectCandidateForManualCopy(index) {
        const textNode = candidateList.querySelector(`[data-index="${index}"]`);
        if (!textNode) return;
        const range = document.createRange();
        range.selectNodeContents(textNode);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textNode.focus();
      }

      function markCopied(index) {
        candidateList.querySelectorAll("[data-copy-index]").forEach((button) => {
          const copied = button.dataset.copyIndex === String(index);
          button.textContent = copied ? "已复制" : "复制这条";
          button.classList.toggle("copied", copied);
        });
      }

      async function copyCandidate(index) {
        if (!currentBatch.length) generateBatchOutput();
        const result = currentBatch[index];
        if (!result) return;
        try {
          await navigator.clipboard.writeText(result.text);
          markCopied(index);
          showToast("已复制，可以去朋友圈粘贴");
        } catch (error) {
          selectCandidateForManualCopy(index);
          try {
            const copied = document.execCommand && document.execCommand("copy");
            if (copied) markCopied(index);
            showToast(copied ? "已复制，可以去朋友圈粘贴" : "已选中文案，请手动复制");
          } catch (fallbackError) {
            showToast("已选中文案，请手动复制");
          }
        }
      }

      function setPressed(group, button) {
        group.querySelectorAll("button").forEach((item) => {
          item.setAttribute("aria-pressed", item === button ? "true" : "false");
        });
      }

      function syncPressedFromState() {
        groups.forEach((group) => {
          const groupName = group.dataset.group;
          const button = group.querySelector(`[data-value="${state[groupName]}"]`);
          if (button) setPressed(group, button);
        });
      }

      function saveLocalState() {
        try {
          const payload = {
            state: {
              intent: state.intent,
              target: state.target,
              time: state.time,
              tone: state.tone,
              material: state.material,
            },
            brief: {
              fact: todayFactInput.value,
              reminder: todayReminderInput.value,
              risk: todayRiskInput.value,
            },
            toggles: {
              emoji: emojiToggle.checked,
              safeBenefit: safeBenefitToggle.checked,
            },
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        } catch (error) {
          // localStorage may be blocked in some in-app browsers; generation still works.
        }
      }

      function restoreLocalState() {
        try {
          const payload = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (!payload) return;
          ["intent", "target", "time", "tone", "material"].forEach((key) => {
            if (payload.state?.[key] && state[key] !== undefined) state[key] = payload.state[key];
          });
          todayFactInput.value = payload.brief?.fact || "";
          todayReminderInput.value = payload.brief?.reminder || "";
          todayRiskInput.value = payload.brief?.risk || "";
          if (typeof payload.toggles?.emoji === "boolean") emojiToggle.checked = payload.toggles.emoji;
          if (typeof payload.toggles?.safeBenefit === "boolean") safeBenefitToggle.checked = payload.toggles.safeBenefit;
          syncPressedFromState();
        } catch (error) {
          try {
            localStorage.removeItem(STORAGE_KEY);
          } catch (storageError) {
            // Ignore blocked storage; the page should still generate copy.
          }
        }
      }

      groups.forEach((group) => {
        const groupName = group.dataset.group;
        group.addEventListener("click", (event) => {
          const button = event.target.closest("button");
          if (!button) return;
          state[groupName] = button.dataset.value;
          setPressed(group, button);
          saveLocalState();
        });
      });

      [todayFactInput, todayReminderInput, todayRiskInput, emojiToggle, safeBenefitToggle].forEach((input) => {
        input.addEventListener("input", saveLocalState);
        input.addEventListener("change", saveLocalState);
      });

      candidateList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-copy-index]");
        if (!button) return;
        copyCandidate(Number(button.dataset.copyIndex));
      });

      generateButton.addEventListener("click", generateBatchOutput);
      regenerateButton.addEventListener("click", generateBatchOutput);

      restoreLocalState();
      generateBatchOutput();
    </script>
  </body>
</html>
