<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>朴牛牛朋友圈生成器</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --panel: #ffffff;
        --panel-soft: #f8faf9;
        --text: #1f2a24;
        --muted: #66736c;
        --subtle: #8c9892;
        --line: #dfe6e2;
        --line-strong: #c8d5ce;
        --wechat: #07c160;
        --wechat-dark: #04954a;
        --warm: #f4aa3c;
        --danger: #c84732;
        --shadow: 0 14px 40px rgba(31, 42, 36, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(7, 193, 96, 0.12), rgba(244, 246, 245, 0) 280px),
          var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", Arial, sans-serif;
        letter-spacing: 0;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: min(100%, 780px);
        margin: 0 auto;
        padding: 18px 14px calc(96px + env(safe-area-inset-bottom));
      }

      .hero {
        padding: 10px 2px 14px;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .version {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(7, 193, 96, 0.25);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.08);
        font-size: 12px;
        font-weight: 650;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: 30px;
        line-height: 1.14;
        letter-spacing: 0;
      }

      .hero p {
        margin: 0;
        max-width: 34em;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.62;
      }

      .panel {
        margin: 12px 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .panel + .panel {
        margin-top: 14px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.3;
      }

      .hint {
        margin: 0;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.5;
      }

      .field {
        margin-top: 18px;
      }

      .field:first-child {
        margin-top: 0;
      }

      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      label,
      .field-label {
        display: block;
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
      }

      .chip-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .chip {
        min-height: 42px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        text-align: center;
        font-size: 14px;
        font-weight: 650;
        line-height: 1.25;
        cursor: pointer;
      }

      .chip[aria-pressed="true"] {
        border-color: var(--wechat);
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
        box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.24);
      }

      .chip:focus-visible,
      .secondary-button:focus-visible,
      .primary-button:focus-visible,
      textarea:focus-visible {
        outline: 3px solid rgba(7, 193, 96, 0.25);
        outline-offset: 2px;
      }

      .textarea-wrap {
        position: relative;
      }

      textarea {
        width: 100%;
        min-height: 84px;
        resize: vertical;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        font-size: 15px;
        line-height: 1.65;
      }

      textarea::placeholder {
        color: #9ba7a1;
      }

      .switches {
        display: grid;
        gap: 10px;
      }

      .switch-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .switch-row input {
        width: 20px;
        height: 20px;
        accent-color: var(--wechat);
        margin: 1px 0 0;
      }

      .switch-row span {
        display: block;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
      }

      .switch-row small {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .result-panel {
        border-color: rgba(7, 193, 96, 0.35);
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .result-title {
        margin: 0;
        font-size: 16px;
      }

      .count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 12px;
      }

      .moment-output {
        width: 100%;
        min-height: 176px;
        border-color: var(--line-strong);
        background: #fff;
        white-space: pre-wrap;
      }

      .suggestion {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #f0dfbf;
        background: #fffaf1;
      }

      .suggestion strong {
        display: block;
        margin-bottom: 5px;
        color: #8a5b13;
        font-size: 13px;
      }

      .suggestion p {
        margin: 0;
        color: #5f4b2b;
        font-size: 14px;
        line-height: 1.58;
      }

      .actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        margin-top: 12px;
      }

      .secondary-button,
      .primary-button {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }

      .secondary-button {
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
      }

      .primary-button {
        color: #fff;
        background: var(--wechat);
        box-shadow: 0 10px 24px rgba(7, 193, 96, 0.25);
      }

      .primary-button:active,
      .secondary-button:active,
      .chip:active {
        transform: translateY(1px);
      }

      .sticky-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: rgba(244, 246, 245, 0.88);
        border-top: 1px solid rgba(223, 230, 226, 0.9);
        backdrop-filter: blur(18px);
      }

      .sticky-inner {
        width: min(100%, 780px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(78px + env(safe-area-inset-bottom));
        z-index: 30;
        transform: translateX(-50%) translateY(12px);
        max-width: calc(100vw - 32px);
        padding: 9px 12px;
        border-radius: 8px;
        color: #fff;
        background: rgba(31, 42, 36, 0.88);
        font-size: 13px;
        line-height: 1.4;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .note {
        margin: 12px 2px 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      @media (min-width: 620px) {
        .app {
          padding-top: 28px;
        }

        h1 {
          font-size: 34px;
        }

        .panel {
          padding: 20px;
        }

        .chip-group {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .switches {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sticky-inner {
          grid-template-columns: 220px;
          justify-content: end;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="eyebrow">
          <span>朴牛牛黑牛烤肉 · 门店员工版</span>
          <span class="version">本地 v1</span>
        </div>
        <h1>朋友圈生成器</h1>
        <p>
          选几个条件，生成一条短一点、像真人发的朋友圈。可以直接复制，也会给一条配图建议。
        </p>
      </header>

      <section class="panel" aria-labelledby="quick-form-title">
        <div class="section-title">
          <h2 id="quick-form-title">今天这条朋友圈怎么发</h2>
          <p class="hint">不填补充也能生成</p>
        </div>

        <div class="field">
          <div class="label-row">
            <span class="field-label">发送时段</span>
          </div>
          <div class="chip-group" data-group="time">
            <button class="chip" type="button" data-value="morning" aria-pressed="true">早上10点</button>
            <button class="chip" type="button" data-value="lunch" aria-pressed="false">午餐前</button>
            <button class="chip" type="button" data-value="afternoon" aria-pressed="false">下午</button>
            <button class="chip" type="button" data-value="dinner" aria-pressed="false">晚餐前</button>
            <button class="chip" type="button" data-value="lateNight" aria-pressed="false">夜宵前</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <span class="field-label">今天想实现什么目的</span>
          </div>
          <div class="chip-group" data-group="purpose">
            <button class="chip" type="button" data-value="newProduct" aria-pressed="true">推新品</button>
            <button class="chip" type="button" data-value="signature" aria-pressed="false">推招牌产品</button>
            <button class="chip" type="button" data-value="scene" aria-pressed="false">打场景</button>
            <button class="chip" type="button" data-value="oldCustomer" aria-pressed="false">老客回流</button>
            <button class="chip" type="button" data-value="benefit" aria-pressed="false">福利提醒</button>
            <button class="chip" type="button" data-value="atmosphere" aria-pressed="false">现场氛围</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <span class="field-label">主要发给谁看</span>
          </div>
          <div class="chip-group" data-group="target">
            <button class="chip" type="button" data-value="oldMembers" aria-pressed="true">九田家老会员</button>
            <button class="chip" type="button" data-value="workers" aria-pressed="false">万博附近上班族</button>
            <button class="chip" type="button" data-value="friends" aria-pressed="false">朋友聚餐</button>
            <button class="chip" type="button" data-value="family" aria-pressed="false">家庭聚餐</button>
            <button class="chip" type="button" data-value="afterWork" aria-pressed="false">下班吃肉</button>
            <button class="chip" type="button" data-value="weekend" aria-pressed="false">周末客</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <span class="field-label">今天主推什么</span>
          </div>
          <div class="chip-group" data-group="material">
            <button class="chip" type="button" data-value="blackBeef" aria-pressed="true">黑牛必点</button>
            <button class="chip" type="button" data-value="classicPlatter" aria-pressed="false">经典三拼/五拼</button>
            <button class="chip" type="button" data-value="newDishes" aria-pressed="false">新品</button>
            <button class="chip" type="button" data-value="beefRibGift" aria-pressed="false">55元牛仔骨</button>
            <button class="chip" type="button" data-value="voucher69" aria-pressed="false">69抵100</button>
            <button class="chip" type="button" data-value="memberRights" aria-pressed="false">会员权益</button>
            <button class="chip" type="button" data-value="lateMeal" aria-pressed="false">宵夜档</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <span class="field-label">语气</span>
          </div>
          <div class="chip-group" data-group="tone">
            <button class="chip" type="button" data-value="familiar" aria-pressed="true">熟人提醒</button>
            <button class="chip" type="button" data-value="staffDaily" aria-pressed="false">店员日常</button>
            <button class="chip" type="button" data-value="softBenefit" aria-pressed="false">轻福利</button>
            <button class="chip" type="button" data-value="realScene" aria-pressed="false">真实现场</button>
          </div>
        </div>

        <div class="field">
          <label for="extra">简单补充</label>
          <div class="textarea-wrap">
            <textarea
              id="extra"
              maxlength="80"
              placeholder="例如：今天有新品 / 有顾客返图 / 晚上直播 / 牛肉状态不错"
            ></textarea>
          </div>
        </div>

        <div class="field switches" aria-label="生成设置">
          <label class="switch-row">
            <input id="emojiToggle" type="checkbox" checked />
            <span>
              带少量表情
              <small>只加一点点，不做花哨广告。</small>
            </span>
          </label>
          <label class="switch-row">
            <input id="safeBenefitToggle" type="checkbox" checked />
            <span>
              活动口径保守
              <small>福利类内容默认写“到店问当天口径”。</small>
            </span>
          </label>
        </div>
      </section>

      <section class="panel result-panel" aria-labelledby="result-title">
        <div class="result-head">
          <h2 class="result-title" id="result-title">生成结果</h2>
          <span class="count" id="charCount">0字</span>
        </div>
        <textarea class="moment-output" id="momentOutput" readonly></textarea>
        <div class="suggestion" aria-live="polite">
          <strong>配图建议</strong>
          <p id="imageSuggestion">先点“生成朋友圈”，这里会给一条配图建议。</p>
        </div>
        <div class="actions">
          <button class="secondary-button" type="button" id="copyButton">复制文案</button>
          <button class="secondary-button" type="button" id="regenerateButton">换一条</button>
        </div>
        <p class="note">
          提醒：如果当天活动、库存、营业时间没确认，发之前先按门店当天口径删改一句。
        </p>
      </section>
    </main>

    <div class="sticky-bar">
      <div class="sticky-inner">
        <button class="primary-button" type="button" id="generateButton">生成朋友圈</button>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>

        target: {

            closers: ["照片尽量发实拍，更有感觉。", "想吃就来，不用想太复杂。", "真实到店、真实烤肉，才有烟火气。"],

        emojis: ["🥩", "🔥", "🍖", "📍", "✨", "🙌"],
        bannedWords: ["保定第一", "全城最火", "必吃天花板", "错过再等一年", "不来后悔", "爆火全网"],
      };

      const state = {
        time: "morning",
        purpose: "newProduct",
        target: "oldMembers",
        material: "blackBeef",
        tone: "familiar",
      };

      const groups = document.querySelectorAll("[data-group]");
      const extraInput = document.getElementById("extra");
      const emojiToggle = document.getElementById("emojiToggle");
      const safeBenefitToggle = document.getElementById("safeBenefitToggle");
      const output = document.getElementById("momentOutput");
      const charCount = document.getElementById("charCount");
      const imageSuggestion = document.getElementById("imageSuggestion");
      const toast = document.getElementById("toast");
      const generateButton = document.getElementById("generateButton");
      const regenerateButton = document.getElementById("regenerateButton");
      const copyButton = document.getElementById("copyButton");

      function pick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function textLength(text) {
        return text.replace(/\s/g, "").length;
      }

      function cleanText(text) {
        return data.bannedWords.reduce((current, word) => current.replaceAll(word, ""), text);
      }

      function getMaterialLine(materialKey, safeBenefit) {
        const material = data.material[materialKey];
        if (!safeBenefit && material.confidentLines) {
          return pick(material.confidentLines);
        }
        return pick(material.lines);
      }

      function maybeEmoji(enabled) {
        if (!enabled) return "";
        return Math.random() > 0.35 ? `${pick(data.emojis)} ` : "";
      }

      function buildMoment() {
        const safeBenefit = safeBenefitToggle.checked;
        const withEmoji = emojiToggle.checked;
        const time = data.time[state.time];
        const purpose = data.purpose[state.purpose];
        const tone = data.tone[state.tone];
        const extra = extraInput.value.trim();

        const intro = `${maybeEmoji(withEmoji)}${pick(tone.openers)}`;
        const timeLine = Math.random() > 0.25 ? pick(time.lines) : "";
        const purposeLine = pick(purpose.lines);
        const materialLine = getMaterialLine(state.material, safeBenefit);
        const targetLine = pick(data.target[state.target]);
        const extraLine = extra ? `今天补充：${extra}` : "";
        const closer = Math.random() > 0.45 ? pick(purpose.endings) : pick(tone.closers);

        let lines = [intro, timeLine, purposeLine, materialLine, targetLine, extraLine, closer]
          .filter(Boolean)
          .filter((line, index, arr) => arr.indexOf(line) === index);

        while (textLength(lines.join("")) > 122 && lines.length > 4) {
          const removableIndex = lines.findIndex((line) => line === targetLine || line === timeLine);
          lines.splice(removableIndex >= 0 ? removableIndex : 2, 1);
        }

        if (textLength(lines.join("")) < 58) {
          lines.splice(lines.length - 1, 0, pick(data.target[state.target]));
        }

        return cleanText(lines.join("\n"));
      }

      function buildImageSuggestion() {
        const purposeImages = data.purpose[state.purpose].images;
        const materialImages = data.material[state.material].images;
        const backup = ["门头实拍", "烤肉近景", "桌面全景", "员工现场图", "顾客返图"];
        const first = pick(purposeImages);
        const second = pick(materialImages);
        const third = pick(backup);
        return `建议配图：${first}；再补一张${second}。素材不够时，用${third}也可以，尽量发真实现场。`;
      }

      function updateOutput(text, suggestion) {
        output.value = text;
        imageSuggestion.textContent = suggestion;
        charCount.textContent = `${textLength(text)}字`;
      }

      function generateMoment() {
        const text = buildMoment();
        updateOutput(text, buildImageSuggestion());
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function selectOutputForManualCopy() {
        output.removeAttribute("readonly");
        output.focus();
        output.select();
        output.setAttribute("readonly", "readonly");
      }

      async function copyMoment() {
        if (!output.value.trim()) {
          generateMoment();
        }

        try {
          await navigator.clipboard.writeText(output.value);
          showToast("已复制，可以去朋友圈粘贴");
        } catch (error) {
          selectOutputForManualCopy();
          try {
            const copied = document.execCommand && document.execCommand("copy");
            showToast(copied ? "已复制，可以去朋友圈粘贴" : "已选中文案，请手动复制");
          } catch (fallbackError) {
            showToast("已选中文案，请手动复制");
          }
        }
      }

      groups.forEach((group) => {
        const groupName = group.dataset.group;
        group.addEventListener("click", (event) => {
          const button = event.target.closest(".chip");
          if (!button) return;
          state[groupName] = button.dataset.value;
          group.querySelectorAll(".chip").forEach((chip) => {
            chip.setAttribute("aria-pressed", chip === button ? "true" : "false");
          });
        });
      });

      generateButton.addEventListener("click", generateMoment);
      regenerateButton.addEventListener("click", generateMoment);
      copyButton.addEventListener("click", copyMoment);

      generateMoment();
    </script>
