<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>朴牛牛朋友圈生成器</title>
    <style>
      :root {
        --bg: #f3f5f2;
        --panel: #ffffff;
        --panel-soft: #f8faf8;
        --text: #202722;
        --muted: #68746d;
        --subtle: #8b9690;
        --line: #dfe7e1;
        --line-strong: #c6d4ca;
        --wechat: #07c160;
        --wechat-dark: #058944;
        --warm: #c88422;
        --warm-bg: #fff7e8;
        --brown: #5f4430;
        --shadow: 0 16px 36px rgba(32, 39, 34, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(7, 193, 96, 0.12), rgba(243, 245, 242, 0) 260px),
          var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", Arial, sans-serif;
        letter-spacing: 0;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .app {
        width: min(100%, 760px);
        margin: 0 auto;
        padding: 16px 14px calc(104px + env(safe-area-inset-bottom));
      }

      .hero {
        padding: 8px 2px 12px;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .version {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(7, 193, 96, 0.28);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.08);
        font-size: 12px;
        font-weight: 750;
      }

      h1 {
        margin: 10px 0 6px;
        font-size: 28px;
        line-height: 1.14;
        letter-spacing: 0;
      }

      .hero p {
        margin: 0;
        max-width: 34em;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.58;
      }

      .panel {
        margin: 12px 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .section-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section-title h2,
      .result-title h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.35;
      }

      .hint {
        margin: 0;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.5;
        text-align: right;
      }

      .field {
        margin-top: 18px;
      }

      .field:first-child {
        margin-top: 0;
      }

      label,
      .field-label {
        display: block;
        margin-bottom: 9px;
        color: var(--text);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .intent-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .intent-card {
        min-height: 82px;
        padding: 11px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        text-align: left;
        cursor: pointer;
      }

      .intent-card strong {
        display: block;
        margin-bottom: 5px;
        font-size: 15px;
        line-height: 1.25;
      }

      .intent-card small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.42;
      }

      .chip-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .chip {
        min-height: 42px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        text-align: center;
        font-size: 14px;
        font-weight: 750;
        line-height: 1.25;
        cursor: pointer;
      }

      .intent-card[aria-pressed="true"],
      .chip[aria-pressed="true"] {
        border-color: var(--wechat);
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
        box-shadow: inset 0 0 0 1px rgba(7, 193, 96, 0.22);
      }

      .intent-card:focus-visible,
      .chip:focus-visible,
      .text-button:focus-visible,
      .copy-button:focus-visible,
      .secondary-button:focus-visible,
      .primary-button:focus-visible,
      textarea:focus-visible,
      summary:focus-visible {
        outline: 3px solid rgba(7, 193, 96, 0.25);
        outline-offset: 2px;
      }

      textarea {
        width: 100%;
        min-height: 86px;
        resize: vertical;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel-soft);
        font-size: 15px;
        line-height: 1.62;
      }

      textarea::placeholder {
        color: #9aa69f;
      }

      .advanced {
        margin-top: 18px;
        border-top: 1px solid var(--line);
      }

      .advanced summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        list-style: none;
        color: var(--wechat-dark);
        cursor: pointer;
        font-size: 14px;
        font-weight: 850;
      }

      .advanced summary::-webkit-details-marker {
        display: none;
      }

      .advanced summary::after {
        content: "展开";
        flex: 0 0 auto;
        color: var(--subtle);
        font-size: 12px;
        font-weight: 700;
      }

      .advanced[open] summary::after {
        content: "收起";
      }

      .advanced-grid {
        display: grid;
        gap: 18px;
        padding-top: 2px;
      }

      .switches {
        display: grid;
        gap: 10px;
      }

      .switch-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .switch-row input {
        width: 20px;
        height: 20px;
        accent-color: var(--wechat);
        margin: 1px 0 0;
      }

      .switch-row span {
        display: block;
        margin-bottom: 2px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .switch-row small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .result-panel {
        padding: 0;
        overflow: hidden;
        border-color: rgba(7, 193, 96, 0.32);
      }

      .result-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 0;
      }

      .count {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 12px;
      }

      .moment-preview {
        margin-top: 12px;
        padding: 15px 14px 14px;
        background: #fff;
      }

      .moment-user {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #202722, #5f4430);
        font-size: 18px;
        font-weight: 900;
      }

      .moment-name {
        min-width: 0;
      }

      .moment-name strong {
        display: block;
        overflow: hidden;
        color: #295a3f;
        font-size: 15px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .moment-name small {
        display: block;
        margin-top: 2px;
        color: var(--subtle);
        font-size: 12px;
        line-height: 1.35;
      }

      .moment-text {
        min-height: 142px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #17201a;
        background: #fbfcfb;
        font-size: 17px;
        line-height: 1.72;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .image-tip {
        margin-top: 11px;
        padding: 10px 11px;
        border: 1px solid #efd8aa;
        border-radius: 8px;
        color: var(--brown);
        background: var(--warm-bg);
        font-size: 13px;
        line-height: 1.55;
      }

      .copy-button {
        width: 100%;
        min-height: 58px;
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: var(--wechat);
        box-shadow: 0 12px 24px rgba(7, 193, 96, 0.28);
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
      }

      .rewrite-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .text-button {
        min-height: 38px;
        padding: 8px 7px;
        border: 1px solid rgba(7, 193, 96, 0.18);
        border-radius: 8px;
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.07);
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .note {
        margin: 12px 14px 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .secondary-button,
      .primary-button {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 850;
        cursor: pointer;
      }

      .secondary-button {
        color: var(--wechat-dark);
        background: rgba(7, 193, 96, 0.1);
      }

      .primary-button {
        color: #fff;
        background: var(--wechat);
        box-shadow: 0 10px 24px rgba(7, 193, 96, 0.24);
      }

      .primary-button:active,
      .secondary-button:active,
      .copy-button:active,
      .text-button:active,
      .intent-card:active,
      .chip:active {
        transform: translateY(1px);
      }

      .sticky-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: rgba(243, 245, 242, 0.9);
        border-top: 1px solid rgba(223, 231, 225, 0.95);
        backdrop-filter: blur(18px);
      }

      .sticky-inner {
        width: min(100%, 760px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(82px + env(safe-area-inset-bottom));
        z-index: 30;
        transform: translateX(-50%) translateY(12px);
        max-width: calc(100vw - 32px);
        padding: 10px 12px;
        border-radius: 8px;
        color: #fff;
        background: rgba(32, 39, 34, 0.9);
        font-size: 13px;
        line-height: 1.4;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (min-width: 620px) {
        .app {
          padding-top: 26px;
        }

        h1 {
          font-size: 34px;
        }

        .panel {
          padding: 18px;
        }

        .result-panel {
          padding: 0;
        }

        .result-title {
          padding: 18px 18px 0;
        }

        .moment-preview {
          padding: 16px 18px 18px;
        }

        .intent-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .chip-group {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .advanced-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .switches {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sticky-inner {
          grid-template-columns: 150px 220px;
          justify-content: end;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="eyebrow">
          <span>朴牛牛黑牛烤肉 · 门店员工版</span>
          <span class="version">v2</span>
        </div>
        <h1>朋友圈生成器</h1>
        <p>少选几项，生成一条像店里人自己发的短文案。复制按钮放大了，生成后直接发朋友圈。</p>
      </header>

      <section class="panel" aria-labelledby="quick-form-title">
        <div class="section-title">
          <h2 id="quick-form-title">先选今天要发什么</h2>
          <p class="hint">高级项默认不用管</p>
        </div>

        <div class="field">
          <span class="field-label">今天发什么</span>
          <div class="intent-grid" data-group="intent">
            <button class="intent-card" type="button" data-value="newProduct" aria-pressed="true">
              <strong>新品尝鲜</strong>
              <small>新口味、新菜、想让人试试</small>
            </button>
            <button class="intent-card" type="button" data-value="signature" aria-pressed="false">
              <strong>招牌必点</strong>
              <small>黑牛、拼盘、第一次来好点</small>
            </button>
            <button class="intent-card" type="button" data-value="oldCustomer" aria-pressed="false">
              <strong>老客回来</strong>
              <small>九田家老会员、门店升级</small>
            </button>
            <button class="intent-card" type="button" data-value="afterWork" aria-pressed="false">
              <strong>下班聚餐</strong>
              <small>万博附近、朋友约饭</small>
            </button>
            <button class="intent-card" type="button" data-value="atmosphere" aria-pressed="false">
              <strong>现场热闹</strong>
              <small>店里日常、顾客返图、烟火气</small>
            </button>
            <button class="intent-card" type="button" data-value="benefit" aria-pressed="false">
              <strong>福利提醒</strong>
              <small>团购、会员权益、当天活动</small>
            </button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">发给谁看</span>
          <div class="chip-group" data-group="target">
            <button class="chip" type="button" data-value="oldMembers" aria-pressed="true">老会员</button>
            <button class="chip" type="button" data-value="workers" aria-pressed="false">附近上班族</button>
            <button class="chip" type="button" data-value="gathering" aria-pressed="false">朋友/家庭聚餐</button>
            <button class="chip" type="button" data-value="nightMeat" aria-pressed="false">晚上想吃肉的人</button>
          </div>
        </div>

        <div class="field">
          <label for="extra">简单补充</label>
          <textarea
            id="extra"
            maxlength="70"
            placeholder="可不填。例如：今天有新品 / 有顾客返图 / 晚上直播 / 牛肉状态不错"
          ></textarea>
        </div>

        <details class="advanced">
          <summary>高级设置</summary>
          <div class="advanced-grid">
            <div class="field">
              <span class="field-label">时段</span>
              <div class="chip-group" data-group="time">
                <button class="chip" type="button" data-value="morning" aria-pressed="true">早上10点</button>
                <button class="chip" type="button" data-value="lunch" aria-pressed="false">午餐前</button>
                <button class="chip" type="button" data-value="afternoon" aria-pressed="false">下午</button>
                <button class="chip" type="button" data-value="dinner" aria-pressed="false">晚餐前</button>
                <button class="chip" type="button" data-value="lateNight" aria-pressed="false">夜宵前</button>
              </div>
            </div>

            <div class="field">
              <span class="field-label">语气</span>
              <div class="chip-group" data-group="tone">
                <button class="chip" type="button" data-value="familiar" aria-pressed="true">熟人提醒</button>
                <button class="chip" type="button" data-value="staffDaily" aria-pressed="false">店员日常</button>
                <button class="chip" type="button" data-value="softBenefit" aria-pressed="false">轻福利</button>
                <button class="chip" type="button" data-value="realScene" aria-pressed="false">真实现场</button>
              </div>
            </div>

            <div class="field">
              <span class="field-label">主推素材</span>
              <div class="chip-group" data-group="material">
                <button class="chip" type="button" data-value="auto" aria-pressed="true">自动匹配</button>
                <button class="chip" type="button" data-value="blackBeef" aria-pressed="false">黑牛必点</button>
                <button class="chip" type="button" data-value="classicPlatter" aria-pressed="false">三拼/五拼</button>
                <button class="chip" type="button" data-value="newDishes" aria-pressed="false">新品</button>
                <button class="chip" type="button" data-value="beefRibGift" aria-pressed="false">55元牛仔骨</button>
                <button class="chip" type="button" data-value="voucher69" aria-pressed="false">69抵100</button>
                <button class="chip" type="button" data-value="memberRights" aria-pressed="false">会员权益</button>
                <button class="chip" type="button" data-value="lateMeal" aria-pressed="false">宵夜档</button>
              </div>
            </div>

            <div class="field switches" aria-label="生成设置">
              <label class="switch-row">
                <input id="emojiToggle" type="checkbox" checked />
                <span>
                  带少量表情
                  <small>只加一点点，不做花哨广告。</small>
                </span>
              </label>
              <label class="switch-row">
                <input id="safeBenefitToggle" type="checkbox" checked />
                <span>
                  活动口径保守
                  <small>福利默认写“以当天门店口径为准”。</small>
                </span>
              </label>
            </div>
          </div>
        </details>
      </section>

      <section class="panel result-panel" aria-labelledby="result-title">
        <div class="result-title">
          <h2 id="result-title">复制这条朋友圈</h2>
          <span class="count" id="charCount">0字</span>
        </div>

        <div class="moment-preview">
          <div class="moment-user">
            <div class="avatar" aria-hidden="true">朴</div>
            <div class="moment-name">
              <strong>朴牛牛万博店</strong>
              <small id="resultMeta">刚刚 · 门店实拍</small>
            </div>
          </div>

          <div class="moment-text" id="momentOutput" tabindex="0" aria-live="polite"></div>
          <div class="image-tip" id="imageSuggestion">配图：先点“生成朋友圈”，这里会给一条建议。</div>

          <button class="copy-button" type="button" id="copyButton">复制这条朋友圈</button>

          <div class="rewrite-row" aria-label="快速改写">
            <button class="text-button" type="button" data-rewrite="daily">更日常</button>
            <button class="text-button" type="button" data-rewrite="short">更短</button>
            <button class="text-button" type="button" data-rewrite="scene">更有现场感</button>
          </div>
        </div>

        <p class="note">提醒：如果当天活动、库存、营业时间没确认，发之前先按门店当天口径删改一句。</p>
      </section>
    </main>

    <div class="sticky-bar">
      <div class="sticky-inner">
        <button class="secondary-button" type="button" id="regenerateButton">换一条</button>
        <button class="primary-button" type="button" id="generateButton">生成朋友圈</button>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const data = {
        time: {
          morning: {
            label: "早上10点",
            cues: ["上午先轻轻提醒一下", "早上这条先发给老朋友看看", "今天先从一条吃肉提醒开始"],
          },
          lunch: {
            label: "午餐前",
            cues: ["午饭前刷到这条，可以先留着", "中午不知道吃什么，可以看看我们这边", "午餐前给附近朋友一个选择"],
          },
          afternoon: {
            label: "下午",
            cues: ["下午店里不忙，发点真实日常", "下午先把今天店里的状态同步一下", "刷到这条的朋友可以先收藏"],
          },
          dinner: {
            label: "晚餐前",
            cues: ["晚饭前提醒一下，今晚可以吃点热乎的", "晚餐不知道约哪儿，可以先看这条", "今晚想吃肉的朋友，可以安排起来"],
          },
          lateNight: {
            label: "夜宵前",
            cues: ["晚上还想吃口热的，可以问问我们", "夜里想吃点肉，这条可以先留着", "9点后想吃烤肉，也可以看看今天安排"],
          },
        },
        tone: {
          familiar: {
            openers: ["老朋友们，提醒一下", "熟客朋友看到这条，可以先留一下", "今天这条就当熟人提醒"],
            closers: ["不着急，路过再来。", "有空回来吃肉就行。", "到店问我们，别自己研究半天。"],
          },

        const timeCue = pick(time.cues);
        const angle = pick(intent.angles[structure]);
        const targetLine = state.rewrite === "short" ? pick(target.short) : pick(target.cues);
        const closer = pick(tone.closers);
        const extraLine = extra ? `今天补充：${extra}` : "";

        const templates = {
          familiar: [opener, angle, targetLine, extraLine, closer],
          daily: [timeCue, angle, materialLine, extraLine, pick(["想吃的话直接来店里问。", "不写太满，大家看真实状态就行。", "今天适合拍实物图，别太像广告。"])],
          question: [angle, materialLine, targetLine, extraLine, pick(["到店问我们就行。", "不会点也没关系，我们帮你搭。", "先收藏，想吃肉的时候再翻出来。"])],
          order: [angle, materialLine, targetLine, extraLine, pick(["几个人来都能帮你搭一桌。", "想吃得稳一点，就这样点。", "发朋友圈配实拍图更自然。"])],
          benefit: [opener, angle, materialLine, extraLine, pick(["具体以当天门店和平台展示为准。", "能用的我们会帮你看清楚。", "先留着，来吃的时候问一句。"])],
        };

        let lines = templates[structure].filter(Boolean);

        if (state.rewrite === "scene") {
          lines.splice(Math.min(2, lines.length), 0, pick(["建议配一张烤盘近景，看着更像现场。", "图片用今天实拍就好，真实比精修更好。"]));
        }

        return lines.filter((line, index, arr) => arr.indexOf(line) === index);
      }

      function fitLines(lines) {
        const minimum = state.rewrite === "short" ? 42 : 50;
        const maximum = state.rewrite === "short" ? 82 : 110;
        let next = lines.slice();
        const removable = ["今天补充：", "建议配一张", "图片用今天", "具体以当天", "先收藏"];

        while (textLength(next.join("")) > maximum && next.length > 3) {
          const index = next.findIndex((line) => removable.some((prefix) => line.startsWith(prefix)));
          next.splice(index >= 0 ? index : next.length - 2, 1);
        }

        if (textLength(next.join("")) < minimum) {
          const target = data.target[state.target];
          next.splice(next.length - 1, 0, pick(target.short));
        }

        return next;
      }

      function buildMoment() {
        let structure = chooseStructure();
        let lines = fitLines(buildLines(structure));
        let text = cleanText(lines.join("\n"));
        let signature = `${state.intent}-${state.target}-${state.time}-${state.tone}-${state.material}-${structure}-${text}`;

        if (signature === lastSignature) {
          structure = chooseStructure();
          lines = fitLines(buildLines(structure));
          text = cleanText(lines.join("\n"));
          signature = `${state.intent}-${state.target}-${state.time}-${state.tone}-${state.material}-${structure}-${text}`;
        }

        lastSignature = signature;
        return { text, structure };
      }

      function buildImageSuggestion() {
        const intent = data.intent[state.intent];
        const material = data.material[getEffectiveMaterial()];
        const backup = ["门头实拍", "烤肉近景", "桌面全景", "员工现场图", "顾客返图"];
        const first = pick(intent.image);
        const second = pick(material.image);
        const third = pick(backup);
        return `配图：${first} + ${second}。素材不够时用${third}，尽量发今天真实现场。`;
      }

      function updateOutput(result) {
        currentMomentText = result.text;
        output.textContent = result.text;
        imageSuggestion.textContent = buildImageSuggestion();
        charCount.textContent = `${textLength(result.text)}字`;
        resultMeta.textContent = `${data.intent[state.intent].label} · ${data.target[state.target].label}`;
      }

      function generateMoment(rewrite = "normal") {
        state.rewrite = rewrite;
        updateOutput(buildMoment());
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function selectOutputForManualCopy() {
        const range = document.createRange();
        range.selectNodeContents(output);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        output.focus();
      }

      async function copyMoment() {
        if (!currentMomentText.trim()) {
          generateMoment();
        }

        try {
          await navigator.clipboard.writeText(currentMomentText);
          showToast("已复制，可以去朋友圈粘贴");
        } catch (error) {
          selectOutputForManualCopy();
          try {
            const copied = document.execCommand && document.execCommand("copy");
            showToast(copied ? "已复制，可以去朋友圈粘贴" : "已选中文案，请手动复制");
          } catch (fallbackError) {
            showToast("已选中文案，请手动复制");
          }
        }
      }

      function setPressed(group, button) {
        group.querySelectorAll("button").forEach((item) => {
          item.setAttribute("aria-pressed", item === button ? "true" : "false");
        });
      }

      groups.forEach((group) => {
        const groupName = group.dataset.group;
        group.addEventListener("click", (event) => {
          const button = event.target.closest("button");
          if (!button) return;
          state[groupName] = button.dataset.value;
          setPressed(group, button);
        });
      });

      generateButton.addEventListener("click", () => generateMoment("normal"));
      regenerateButton.addEventListener("click", () => generateMoment(state.rewrite));
      copyButton.addEventListener("click", copyMoment);

      rewriteButtons.forEach((button) => {
        button.addEventListener("click", () => generateMoment(button.dataset.rewrite));
      });

      generateMoment();
    </script>
  </body>
</html>
